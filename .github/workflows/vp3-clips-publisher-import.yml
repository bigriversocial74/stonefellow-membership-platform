name: Stonefellow VP3 Clips clean source import

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  import-readable-source:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'feature/vp3-clips-publisher-bridge-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Verify transport chunks
        run: |
          set -euo pipefail
          expected=(
            0d28c383532a0f18b45f82f425029a79c771b72d968677b0c1f64a1b8aed43ce
            85ace1a2ed2506c7b9300d65199eaabe5832ecbcf0cfc92aa8768c6c3771e490
            9a06bf4aecba54521251c2195cbb59bb75b3b15f4ee72c60683dae5cecc420ff
            e9e6531049658ffd38f30840b48553741c65c116f8c8bd6df95794f3b18b980b
            9c76ef3c06540073acc2bf724f0770d608666fa9a6e8595a119df846b0b71436
            d67b3d0ec5b11ab37a491a89593d6471ffe2b8942ce975a0ed873ecac6f9bdf1
          )
          for part in 00 01 02 03 04 05; do
            base64 --decode ".vp3-import/part-${part}.b64" > "/tmp/stone-part-${part}.bin"
            index=$((10#$part))
            echo "${expected[$index]}  /tmp/stone-part-${part}.bin" | sha256sum -c -
          done
      - name: Reconstruct audited source
        run: |
          set -euo pipefail
          cat /tmp/stone-part-{00..05}.bin > /tmp/stone-vp3-clips-bridge.tar.gz
          test "$(stat -c%s /tmp/stone-vp3-clips-bridge.tar.gz)" = '20021'
          echo 'f235e14696bfde5b2e96c7331cacc5052053a09e64c6869d823c660ea649ef58  /tmp/stone-vp3-clips-bridge.tar.gz' | sha256sum -c -
      - name: Reset to current main and extract
        run: |
          set -euo pipefail
          git config user.name 'Stonefellow Build Automation'
          git config user.email 'actions@users.noreply.github.com'
          git fetch origin main
          git reset --hard origin/main
          git clean -fdx
          tar -xzf /tmp/stone-vp3-clips-bridge.tar.gz
      - name: Commit clip runtime and source ownership
        run: |
          set -euo pipefail
          git add database/migrations/027_vp3_clips_publisher_bridge.sql includes/vp3_clips.php includes/vp3_clips_core.php includes/vp3_clips_render.php includes/vp3_clips_bridge.php includes/vp3_clips_jobs.php jobs/vp3-clips-worker.php vp3-clip-media.php
          git commit -m 'Build Stonefellow VP3 Clips publisher runtime'
      - name: Commit creator workspace and navigation
        run: |
          set -euo pipefail
          git add admin/vp3-clips.php admin/vp3-clip-editor.php admin/vp3-clips-settings.php includes/admin_catalog.php
          git commit -m 'Build Stonefellow clip creator and bridge workspace'
      - name: Commit verification and documentation
        run: |
          set -euo pipefail
          git add docs/VP3_CLIPS_PUBLISHER_BRIDGE_V1.md docs/CODE_AUDIT_VP3_CLIPS_PUBLISHER_BRIDGE_V1.md tests/vp3_clips_bridge_smoke.php tools/vp3-clips-bridge-audit.php .github/workflows/vp3-clips-bridge.yml
          git commit -m 'Certify Stonefellow VP3 Clips publishing bridge'
      - name: Verify clean source history
        run: |
          set -euo pipefail
          test ! -e .vp3-import
          test ! -e .github/workflows/vp3-clips-publisher-import.yml
          test -z "$(git status --porcelain)"
          git log --oneline -4
      - name: Replace staging history
        run: git push --force-with-lease origin "HEAD:${{ github.event.pull_request.head.ref }}"
