name: Stonefellow Code Audit
on:
  pull_request:
  push:
    branches: [main]
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: PHP syntax validation
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            php -l "$file" >/dev/null || { php -l "$file"; exit 1; }
          done < <(find . -type f -name '*.php' -not -path './vendor/*' -print0)
          echo "All PHP files passed syntax validation."
      - name: Security smoke tests
        run: php tests/security_smoke.php
      - name: Agentic governance smoke tests
        run: php tests/agentic_governance_smoke.php
      - name: AI staging certification smoke tests
        run: php tests/ai_staging_certification_smoke.php
      - name: Revenue membership media access smoke tests
        run: php tests/revenue_membership_media_access_smoke.php
      - name: Data integrity operations recovery smoke tests
        run: php tests/data_ops_recovery_smoke.php
      - name: Frontend accessibility performance smoke tests
        run: php tests/frontend_quality_smoke.php
      - name: Authentication privacy abuse smoke tests
        run: php tests/auth_privacy_abuse_smoke.php
      - name: Content publishing search moderation smoke tests
        run: php tests/content_integrity_smoke.php
      - name: Delivery scheduler notification smoke tests
        run: php tests/delivery_integrity_smoke.php
      - name: Staging launch certification smoke tests
        run: php tests/staging_launch_certification_smoke.php
      - name: Staging integration matrix smoke tests
        run: php tests/staging_integration_matrix_smoke.php
      - name: Production launch promotion smoke tests
        run: php tests/production_launch_smoke.php
      - name: Whole-platform certification smoke tests
        run: php tests/platform_certification_smoke.php
      - name: Full static code audit
        run: php tools/code-audit.php
      - name: Agentic integration audit
        run: php tools/agentic-audit.php
      - name: AI staging certification audit
        run: php tools/ai-staging-certification-audit.php
      - name: Revenue membership media access audit
        run: php tools/revenue-membership-media-access-audit.php
      - name: Data integrity operations recovery audit
        run: php tools/data-ops-recovery-audit.php
      - name: Frontend accessibility performance audit
        run: php tools/frontend-quality-audit.php
      - name: Authentication privacy abuse audit
        run: php tools/auth-privacy-abuse-audit.php
      - name: Content publishing search moderation audit
        run: php tools/content-integrity-audit.php
      - name: Delivery scheduler notification audit
        run: php tools/delivery-integrity-audit.php
      - name: Staging operations launch certification audit
        run: php tools/staging-launch-certification-audit.php
      - name: Staging integration matrix audit
        run: php tools/staging-integration-matrix-audit.php
      - name: Release candidate production launch audit
        run: php tools/production-launch-audit.php
      - name: Whole-platform source certification audit
        run: php tools/platform-certification-audit.php
