name: Stonefellow Code Audit
on:
  pull_request:
  push:
    branches: [main]
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: PHP syntax - launch certification
        run: php -l includes/staging_launch_certification.php && php -l admin/staging-launch-certification.php && php -l deploy/preflight.php && php -l tests/staging_launch_certification_smoke.php && php -l tools/staging-launch-certification-audit.php
      - name: PHP syntax - delivery core
        run: php -l includes/delivery_integrity.php && php -l includes/notifications.php && php -l includes/ops_scheduler_messaging.php
      - name: PHP syntax - email templates admin
        run: php -l admin/email-templates.php
      - name: PHP syntax - member messaging admin
        run: php -l admin/member-messaging.php
      - name: PHP syntax - notifications admin
        run: php -l admin/notifications.php
      - name: PHP syntax - ops scheduler admin
        run: php -l admin/ops-scheduler.php
      - name: PHP syntax - member notices API
        run: php -l api/member-notices.php
      - name: PHP syntax - notification webhook API
        run: php -l api/notification-webhook.php
      - name: PHP syntax - ops scheduler API
        run: php -l api/ops-scheduler.php
      - name: PHP syntax - delivery tests and audit
        run: php -l tests/delivery_integrity_smoke.php && php -l tools/delivery-integrity-audit.php
      - name: PHP syntax - remaining repository
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            case "$file" in
              ./includes/staging_launch_certification.php|./admin/staging-launch-certification.php|./deploy/preflight.php|./tests/staging_launch_certification_smoke.php|./tools/staging-launch-certification-audit.php|./includes/delivery_integrity.php|./includes/notifications.php|./includes/ops_scheduler_messaging.php|./admin/email-templates.php|./admin/member-messaging.php|./admin/notifications.php|./admin/ops-scheduler.php|./api/member-notices.php|./api/notification-webhook.php|./api/ops-scheduler.php|./tests/delivery_integrity_smoke.php|./tools/delivery-integrity-audit.php) continue ;;
            esac
            php -l "$file" >/dev/null || { php -l "$file"; exit 1; }
          done < <(find . -type f -name '*.php' -not -path './vendor/*' -print0)
          echo "Remaining PHP files passed syntax validation."
      - name: Security smoke tests
        run: php tests/security_smoke.php
      - name: Agentic governance smoke tests
        run: php tests/agentic_governance_smoke.php
      - name: AI staging certification smoke tests
        run: php tests/ai_staging_certification_smoke.php
      - name: Revenue membership media access smoke tests
        run: php tests/revenue_membership_media_access_smoke.php
      - name: Data integrity operations recovery smoke tests
        run: php tests/data_ops_recovery_smoke.php
      - name: Frontend accessibility performance smoke tests
        run: php tests/frontend_quality_smoke.php
      - name: Authentication privacy abuse smoke tests
        run: php tests/auth_privacy_abuse_smoke.php
      - name: Content publishing search moderation smoke tests
        run: php tests/content_integrity_smoke.php
      - name: Delivery scheduler notification smoke tests
        run: php tests/delivery_integrity_smoke.php
      - name: Staging launch certification smoke tests
        run: php tests/staging_launch_certification_smoke.php
      - name: Full static code audit
        run: php tools/code-audit.php
      - name: Agentic integration audit
        run: php tools/agentic-audit.php
      - name: AI staging certification audit
        run: php tools/ai-staging-certification-audit.php
      - name: Revenue membership media access audit
        run: php tools/revenue-membership-media-access-audit.php
      - name: Data integrity operations recovery audit
        run: php tools/data-ops-recovery-audit.php
      - name: Frontend accessibility performance audit
        run: php tools/frontend-quality-audit.php
      - name: Authentication privacy abuse audit
        run: php tools/auth-privacy-abuse-audit.php
      - name: Content publishing search moderation audit
        run: php tools/content-integrity-audit.php
      - name: Delivery scheduler notification audit
        run: php tools/delivery-integrity-audit.php
      - name: Staging operations launch certification audit
        run: php tools/staging-launch-certification-audit.php
